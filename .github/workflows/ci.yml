name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Type check frontend
        run: npm run type-check --workspace=apps/frontend
        
      - name: Lint frontend
        run: npm run lint --workspace=apps/frontend
        
      - name: Build frontend
        run: npm run build --workspace=apps/frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: "https://backend.example.com"

  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Type check backend
        run: npm run type-check --workspace=apps/backend
        
      - name: Lint backend
        run: npm run lint --workspace=apps/backend
        
      - name: Build backend
        run: npm run build --workspace=apps/backend
        
      - name: Generate Prisma client
        run: npm run db:generate --workspace=apps/backend
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: false
          tags: clonely-fanz-backend:test